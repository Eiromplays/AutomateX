# Production self-host — GHCR images, restart-on-boot, secrets from .env.
#
#   cp .env.example .env        # then fill it in
#   docker compose -f docker-compose.prod.yml up -d
#
# Update to a newer published version later:
#   docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d
#
# Reach it over Tailscale with automatic HTTPS (no ports exposed to the internet):
#   tailscale serve --bg 8080
#   → https://<host>.<tailnet>.ts.net   (use this as PUBLIC_BASE_URL + the OIDC redirect host)
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: automatex
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: automatex
    volumes:
      - automatex-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U automatex"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: a fresh named volume is owned by root, but the API runs as the non-root app user
  # (uid 1654), so it couldn't write uploaded plugins. This chowns the volume once, then exits.
  plugin-init:
    image: alpine:3
    command: ["chown", "-R", "1654:1654", "/app/plugins"]
    volumes:
      - automatex-plugins:/app/plugins
    restart: "no"

  api:
    image: ghcr.io/eiromplays/automatex-api:latest
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__automatex: Host=postgres;Database=automatex;Username=automatex;Password=${POSTGRES_PASSWORD}
      # Required for connection secrets (AES). Losing this makes stored secrets unrecoverable.
      # Generate with: openssl rand -base64 32
      Encryption__Key: "${ENCRYPTION_KEY:?set ENCRYPTION_KEY in .env}"
      # Public https origin (Tailscale ts.net host) used for webhook URLs + OIDC redirects.
      Engine__PublicBaseUrl: ${PUBLIC_BASE_URL}
      # OIDC browser login (an API key, if also set, still works for scripts).
      Auth__Authority: ${OIDC_AUTHORITY}
      Auth__ClientId: ${OIDC_CLIENT_ID}
      Auth__ClientSecret: ${OIDC_CLIENT_SECRET}
      # In-process, full host trust — leave false unless you're actively uploading plugins.
      Engine__AllowPluginUpload: ${ALLOW_PLUGIN_UPLOAD:-false}
      # SSRF guard: block http.request to private/loopback/link-local targets. Off by default so a
      # local LLM / LAN services work; turn on for internet-exposed instances with no internal targets.
      Engine__BlockPrivateNetworkRequests: ${BLOCK_PRIVATE_NETWORK_REQUESTS:-false}
    volumes:
      - automatex-plugins:/app/plugins
    depends_on:
      postgres:
        condition: service_healthy
      plugin-init:
        condition: service_completed_successfully

  web:
    image: ghcr.io/eiromplays/automatex-web:latest
    restart: unless-stopped
    depends_on:
      - api
    # Caddy reverse-proxies /api + /hubs to the api service internally, so the API needs no
    # published port. Only this one is exposed; point Tailscale Serve at it.
    ports:
      - "8080:80"

volumes:
  automatex-postgres-data:
  automatex-plugins:
