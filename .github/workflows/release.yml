name: Release images

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive version and lowercase owner
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Publish api image
        run: >
          dotnet publish src/AutomateX
          -t:PublishContainer
          -p:ContainerRegistry=ghcr.io
          -p:ContainerRepository="${OWNER}/automatex-api"
          -p:ContainerImageTags="\"${VERSION};latest\""

      - name: Build and push web image
        run: |
          docker build \
            -t "ghcr.io/${OWNER}/automatex-web:${VERSION}" \
            -t "ghcr.io/${OWNER}/automatex-web:latest" \
            src/web
          docker push --all-tags "ghcr.io/${OWNER}/automatex-web"

      # Self-deploy: fires the AutomateX webhook AFTER images exist in GHCR.
      # No-op until the AUTOMATEX_DEPLOY_WEBHOOK repo secret holds the full
      # capability URL (.../api/webhooks/<id>?secret=...) - see docs/recipes/self-deploy.md.
      - name: Trigger self-deploy
        env:
          DEPLOY_WEBHOOK: ${{ secrets.AUTOMATEX_DEPLOY_WEBHOOK }}
        run: |
          if [ -n "$DEPLOY_WEBHOOK" ]; then
            curl -fsS -X POST "$DEPLOY_WEBHOOK" \
              -H 'Content-Type: application/json' \
              -d "{\"version\":\"${GITHUB_REF_NAME}\",\"actor\":\"${GITHUB_ACTOR}\"}"
          else
            echo "AUTOMATEX_DEPLOY_WEBHOOK not set - skipping self-deploy trigger."
          fi
