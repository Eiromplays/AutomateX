name: Release images

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # release assets (plugin zips + catalog.json)
  packages: write

jobs:
  # Same checks as CI — a tag that fails them publishes nothing.
  verify:
    uses: ./.github/workflows/verify.yml

  images:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive version and lowercase owner
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Publish api image
        run: >
          dotnet publish src/AutomateX
          -t:PublishContainer
          -p:Version="${VERSION}"
          -p:ContainerRegistry=ghcr.io
          -p:ContainerRepository="${OWNER}/automatex-api"
          -p:ContainerImageTag="${VERSION}"

      - name: Tag api :latest
        run: >
          docker buildx imagetools create
          -t "ghcr.io/${OWNER}/automatex-api:latest"
          "ghcr.io/${OWNER}/automatex-api:${VERSION}"

      - name: Build and push web image
        run: |
          docker build \
            -t "ghcr.io/${OWNER}/automatex-web:${VERSION}" \
            -t "ghcr.io/${OWNER}/automatex-web:latest" \
            src/web
          docker push --all-tags "ghcr.io/${OWNER}/automatex-web"

      - name: Package plugins + catalog
        run: scripts/package-plugins.sh "$GITHUB_REF_NAME"

      - name: Package template catalog
        run: scripts/package-templates.sh

      - name: Publish release with plugin + template assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --generate-notes 2>/dev/null || true
          gh release upload "$GITHUB_REF_NAME" \
            out/plugins/*.zip out/plugins/catalog.json out/plugins/templates-catalog.json --clobber

      # Self-deploy: fires the AutomateX webhook AFTER images exist in GHCR. No-op until both repo
      # secrets are set: AUTOMATEX_DEPLOY_WEBHOOK = the webhook URL (.../api/webhooks/<id>) and
      # AUTOMATEX_DEPLOY_SECRET = the trigger's secret. The body is signed (HMAC-SHA256) — nothing
      # secret travels in the URL. See docs/recipes/self-deploy.md.
      - name: Trigger self-deploy
        env:
          DEPLOY_WEBHOOK: ${{ secrets.AUTOMATEX_DEPLOY_WEBHOOK }}
          DEPLOY_SECRET: ${{ secrets.AUTOMATEX_DEPLOY_SECRET }}
        run: |
          if [ -n "$DEPLOY_WEBHOOK" ] && [ -n "$DEPLOY_SECRET" ]; then
            BODY="{\"version\":\"${GITHUB_REF_NAME}\",\"actor\":\"${GITHUB_ACTOR}\"}"
            SIG="sha256=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$DEPLOY_SECRET" -hex | sed 's/^.* //')"
            curl -fsS -X POST "$DEPLOY_WEBHOOK" \
              -H 'Content-Type: application/json' \
              -H "X-Webhook-Signature: $SIG" \
              -d "$BODY"
          else
            echo "AUTOMATEX_DEPLOY_WEBHOOK / AUTOMATEX_DEPLOY_SECRET not set - skipping self-deploy trigger."
          fi
