name: Release images

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive version and lowercase owner
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Publish api image
        run: >
          dotnet publish src/AutomateX
          -t:PublishContainer
          -p:ContainerRegistry=ghcr.io
          -p:ContainerRepository="${OWNER}/automatex-api"
          -p:ContainerImageTags="\"${VERSION};latest\""

      - name: Build and push web image
        run: |
          docker build \
            -t "ghcr.io/${OWNER}/automatex-web:${VERSION}" \
            -t "ghcr.io/${OWNER}/automatex-web:latest" \
            src/web
          docker push --all-tags "ghcr.io/${OWNER}/automatex-web"
